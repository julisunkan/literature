<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Literature Review Generator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.offline-icon { font-size: 5rem; opacity: 0.15; }
</style>
</head>
<body>
<div class="text-center px-4">
  <div class="text-muted offline-icon">📚</div>
  <h2 class="fw-bold mt-3">You're Offline</h2>
  <p class="text-muted lead">No internet connection detected.</p>
  <p class="text-muted">Your saved reviews and cached papers are still available.</p>
  <button class="btn btn-primary mt-3" onclick="window.location.reload()">
    <i class="bi bi-arrow-clockwise me-2"></i>Try Again
  </button>
  <br>
  <a href="/" class="btn btn-outline-secondary mt-2">Back to Home</a>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>

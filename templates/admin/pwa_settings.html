{% extends "admin/base.html" %}
{% block admin_title %}PWA Settings{% endblock %}
{% block admin_title_h4 %}PWA Settings{% endblock %}

{% block admin_content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="POST" action="/julisunkan/pwa-settings">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">App Name</label>
              <input type="text" name="app_name" class="form-control" value="{{ pwa.get('app_name','Literature Review Generator') }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Short Name</label>
              <input type="text" name="short_name" class="form-control" value="{{ pwa.get('short_name','LitReview') }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Theme Color</label>
              <div class="input-group">
                <input type="color" class="form-control form-control-color" id="themeColorPicker" value="{{ pwa.get('theme_color','#2563eb') }}" oninput="document.getElementById('themeColorText').value=this.value">
                <input type="text" name="theme_color" id="themeColorText" class="form-control" value="{{ pwa.get('theme_color','#2563eb') }}" oninput="document.getElementById('themeColorPicker').value=this.value">
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Background Color</label>
              <div class="input-group">
                <input type="color" class="form-control form-control-color" id="bgColorPicker" value="{{ pwa.get('background_color','#ffffff') }}" oninput="document.getElementById('bgColorText').value=this.value">
                <input type="text" name="background_color" id="bgColorText" class="form-control" value="{{ pwa.get('background_color','#ffffff') }}" oninput="document.getElementById('bgColorPicker').value=this.value">
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Offline Mode</label>
              <select name="offline_mode" class="form-select">
                <option value="1" {% if pwa.get('offline_mode')=='1' %}selected{% endif %}>Enabled</option>
                <option value="0" {% if pwa.get('offline_mode')=='0' %}selected{% endif %}>Disabled</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Install Prompt</label>
              <select name="install_prompt" class="form-select">
                <option value="1" {% if pwa.get('install_prompt')=='1' %}selected{% endif %}>Show Install Banner</option>
                <option value="0" {% if pwa.get('install_prompt')=='0' %}selected{% endif %}>Hide</option>
              </select>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Save PWA Settings</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

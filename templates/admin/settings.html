{% extends "admin/base.html" %}
{% block admin_title %}Site Settings{% endblock %}
{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0">Site Settings</h4>
</div>
<div class="card shadow-sm">
  <div class="card-body">
    <form method="POST" action="/julisunkan/settings">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Site Name</label>
          <input type="text" name="site_name" class="form-control" value="{{ site.get('site_name','') }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Tagline</label>
          <input type="text" name="site_tagline" class="form-control" value="{{ site.get('site_tagline','') }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Contact Email</label>
          <input type="email" name="contact_email" class="form-control" value="{{ site.get('contact_email','') }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Footer Text</label>
          <input type="text" name="footer_text" class="form-control" value="{{ site.get('footer_text','') }}">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">About Text</label>
          <textarea name="about_text" class="form-control" rows="3">{{ site.get('about_text','') }}</textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Privacy Policy</label>
          <textarea name="privacy_policy" class="form-control" rows="4">{{ site.get('privacy_policy','') }}</textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Terms of Use</label>
          <textarea name="terms" class="form-control" rows="4">{{ site.get('terms','') }}</textarea>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Save Settings</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
